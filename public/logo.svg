<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Background gradient: dark navy top-left to slightly lighter bottom-right -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0d1b2e"/>
      <stop offset="100%" stop-color="#162742"/>
    </linearGradient>

    <!-- Line gradient: blue → cyan -->
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>

    <!-- Glow filter for the line and points -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Stronger glow for the last (cyan) point -->
    <filter id="glowStrong" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="url(#bg)"/>

  <!-- Y axis -->
  <line x1="38" y1="28" x2="38" y2="148"
        stroke="rgba(180,210,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- X axis -->
  <line x1="38" y1="148" x2="175" y2="148"
        stroke="rgba(180,210,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Data line -->
  <polyline
    points="52,130  82,105  110,115  137,82  164,50"
    fill="none"
    stroke="url(#lineGrad)"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"/>

  <!-- Data points (blue) -->
  <circle cx="52"  cy="130" r="5"   fill="#4a90d9" filter="url(#glow)"/>
  <circle cx="82"  cy="105" r="5"   fill="#4a90d9" filter="url(#glow)"/>
  <circle cx="110" cy="115" r="5"   fill="#2ab8e0" filter="url(#glow)"/>
  <circle cx="137" cy="82"  r="5"   fill="#00ccee" filter="url(#glow)"/>

  <!-- Last point (bright cyan, larger) -->
  <circle cx="164" cy="50"  r="7"   fill="#00e5ff" filter="url(#glowStrong)"/>

  <!-- Brand text -->
  <text
    x="105" y="174"
    text-anchor="middle"
    fill="rgba(200,220,255,0.75)"
    font-family="Arial, Helvetica, sans-serif"
    font-size="11.5"
    letter-spacing="2.5"
    font-weight="600">FIGUREREADY</text>
</svg>
